<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DocuFree</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Converts paths like /docufree/editor/123 into /?p=/editor/123
      // index.html then reads this and restores the route via history.replaceState
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
